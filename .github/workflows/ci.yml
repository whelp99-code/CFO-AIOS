name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cfo_aios
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma validate
        run: pnpm --filter @cfo/api exec prisma validate

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cfo_aios?schema=public
        run: pnpm db:push

      - name: Build API
        run: pnpm --filter @cfo/api build

      - name: Typecheck web
        run: pnpm --filter @cfo/web typecheck
